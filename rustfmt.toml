# rustfmt.toml — stable-only config so `cargo fmt` is deterministic across
# machines and CI. rust-toolchain.toml pins stable, so everyone (and CI) runs
# the same rustfmt version → no local-vs-CI drift (the old config used
# nightly-only options, forcing `cargo +nightly fmt`, and CI installed a fresh
# nightly each run whose output drifted from any local nightly).
#
# Width control on stable is only max_width + use_small_heuristics; "Max" ties
# every sub-width to max_width, giving the wide, vertically-dense layout the old
# nightly config (chain_width/array_width = 120) aimed for.
max_width = 160
use_small_heuristics = "Max"

# Block-style params; only spill to one-per-line when over max_width.
fn_params_layout = "Compressed"
