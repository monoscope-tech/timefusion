table_name: variant_bench
# Same partitioning shape as otel_logs_and_spans so the bench exercises the
# real-world write path and partition pruning behavior. project_id is the
# tenant key, date is the daily slice.
partitions:
  - project_id
  - date
sorting_columns:
  - name: timestamp
    descending: false
    nulls_first: false
  - name: id
    descending: false
    nulls_first: false
z_order_columns:
  - timestamp
  - id
fields:
  - name: date
    data_type: Date32
    nullable: false
  - name: timestamp
    data_type: 'Timestamp(Microsecond, Some("UTC"))'
    nullable: false
  - name: id
    data_type: Utf8
    nullable: false
  - name: project_id
    data_type: Utf8
    # Same nullability rationale as otel_logs_and_spans: delta-rs nulls out
    # partition columns in per-file stats, and a non-nullable declaration
    # makes every write fail with "Found unmasked nulls".
    nullable: true
  - name: shape
    data_type: Utf8
    nullable: false
  # Variant payload — same JSON object stored encoded as Variant.
  - name: payload
    data_type: Variant
    nullable: true
  # Raw JSON baseline — same JSON object as Utf8 text. Lets the bench
  # measure variant_get vs json_to_variant + variant_get on the same data.
  - name: payload_json
    data_type: Utf8
    nullable: true
