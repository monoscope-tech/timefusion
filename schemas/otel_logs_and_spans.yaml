table_name: otel_logs_and_spans
partitions:
  - project_id
  - date
# Last-write-wins dedup at flush time. Same retry from a client (same span
# id at the same timestamp) collapses to one row before Delta commit. Only
# covers dupes inside one 10-min bucket; cross-bucket dupes need the
# read-side row_number() rewrite.
dedup_keys:
  - id
  - timestamp
# Tie-breaker when rows share (id, timestamp): keep the one with the greatest
# observed_timestamp. The enrichment worker re-emits the enriched row with a
# fresh observed_timestamp (parity plan Defect 3), so it wins over the base row.
# Identical retries share observed_timestamp → tie falls back to keep-last (no
# behavior change for the existing duplicate case).
dedup_tiebreak: observed_timestamp
# Hot paths: point lookup by (timestamp, id), and service_name queries within
# a time range. Leading with `timestamp` keeps row-group min/max stats tight
# for any timestamp-bound query; sorting by service_name next clusters rows
# of the same service together within each row group, so service_name filters
# inside a time range prune at the page level.
sorting_columns:
  - name: timestamp
    descending: false
    nulls_first: false
  - name: resource___service___name
    descending: false
    nulls_first: false
  - name: id
    descending: false
    nulls_first: false
  - name: level
    descending: false
    nulls_first: false
  - name: status_code
    descending: false
    nulls_first: false
# Z-ORDER interleaves bits across all listed columns, so file-level min/max
# stats become useful for each. Three dimensions trade a small amount of
# per-dimension tightness for cross-dimensional file pruning — worth it when
# service_name is also a frequent predicate.
z_order_columns:
  - timestamp
  - id
  - resource___service___name
fields:
  - name: date
    data_type: Date32
    nullable: false
  - name: timestamp
    data_type: 'Timestamp(Microsecond, Some("UTC"))'
    nullable: false
