name: Build and Deploy

on:
  push:
    branches: [ master ]

# Serialize deploys and drop superseded runs: without this, concurrent master
# pushes deploy in build-completion order, and a slower older build can
# overwrite a newer one (2026-06-11: 037e1b9 overwrote e11ed65, re-deploying
# the OOM-crashloop image mid-incident).
concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # NOTE: the Blacksmith sticky-disk builder (useblacksmith/setup-docker-builder
      # + build-push-action) was tried in 9082ef1 to keep the cargo-chef cook layer
      # warm, but it never produced a working build — every run died instantly with
      # `buildkit .../snapshots/metadata.db: no such file` (the sticky disk wasn't
      # provisioned). Reverted to the standard buildx + gha cache that deployed
      # reliably through 19ccb41. Re-attempt Blacksmith only once its sticky-disk
      # feature is confirmed enabled for this repo.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use a container-based driver (using BuildKit) to enable cache export.
          driver-opts: image=moby/buildkit:master

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Preset Image Name
        run: |
          REPO=$(echo ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_URL=${REPO}:$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV
          # Mutable :latest so downstream consumers (e.g. monoscope CI's TF service
          # container) can track the newest master build without pinning a SHA.
          # This workflow only runs on master push, so :latest == latest master.
          echo "IMAGE_LATEST=${REPO}:latest" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_URL }}
            ${{ env.IMAGE_LATEST }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          debug: true

      # Pull the published image and verify the binary actually starts.
      # We previously shipped images that exited at the dynamic linker
      # (GLIBC mismatch from a builder/runtime base skew) because nothing
      # between "image pushed" and "CapRover deploys it" had ever executed
      # the binary. With TIMEFUSION_ALLOW_INSECURE_AUTH the process can
      # boot without secrets, reach the PGWire listen call, then we kill
      # it. SIGTERM via `timeout` exits 124; anything else means the
      # binary crashed and we must NOT deploy it.
      - name: Smoke test pushed image
        run: |
          docker pull "$IMAGE_URL"
          set +e
          docker run --rm \
            -e TIMEFUSION_ALLOW_INSECURE_AUTH=true \
            -e AWS_S3_BUCKET=smoke -e AWS_REGION=us-east-1 \
            -e AWS_ACCESS_KEY_ID=smoke -e AWS_SECRET_ACCESS_KEY=smoke \
            -e RUST_LOG=info \
            --name tf-smoke "$IMAGE_URL" &
          PID=$!
          # Give it 12s to reach the PGWire listen log; then kill.
          for i in $(seq 1 12); do
            if docker logs tf-smoke 2>&1 | grep -q "Listening on 0.0.0.0:5432"; then
              echo "smoke: PGWire listening, image OK"
              docker kill tf-smoke >/dev/null 2>&1 || true
              wait $PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "smoke: binary never reached PGWire listen — last logs:"
          docker logs tf-smoke 2>&1 | tail -40
          docker kill tf-smoke >/dev/null 2>&1 || true
          exit 1

      # A stopped single-writer instance cannot serve while its successor
      # replays an unflushed WAL. Do not start that handoff unless FLUSH has
      # committed every buffered/WAL-backed write.
      - name: Drain production before deploy
        env:
          PGURL: ${{ secrets.TIMEFUSION_PG_URL }}
        run: |
          set -euo pipefail
          : "${PGURL:?TIMEFUSION_PG_URL GitHub Actions secret is required}"
          psql "$PGURL" -v ON_ERROR_STOP=1 -c 'FLUSH'
          drained="$(psql "$PGURL" -v ON_ERROR_STOP=1 -Atqc "SELECT value FROM timefusion_stats WHERE component = 'buffered_layer' AND key = 'drained'")"
          test "$drained" = true || { echo "::error::TimeFusion did not drain; refusing deployment"; exit 1; }

      - id: deploy
        name: Deploy Image to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPTAINROVER_SERVER }}
          app: ${{ secrets.CAPTAINROVER_APP_NAME }}
          token: ${{ secrets.CAPTAINROVER_APP_TOKEN }}
          image: ${{ env.IMAGE_URL }}

      - name: Verify production recovery
        env:
          PGURL: ${{ secrets.TIMEFUSION_PG_URL }}
          MAX_WAL_RECOVERY_MS: '30000'
        run: |
          set -euo pipefail
          : "${PGURL:?TIMEFUSION_PG_URL GitHub Actions secret is required}"
          for _ in $(seq 1 180); do
            if psql "$PGURL" -v ON_ERROR_STOP=1 -Atqc 'SELECT 1' >/dev/null 2>&1; then break; fi
            sleep 1
          done
          psql "$PGURL" -v ON_ERROR_STOP=1 -Atqc 'SELECT 1' >/dev/null
          recovery_ms="$(psql "$PGURL" -v ON_ERROR_STOP=1 -Atqc "SELECT value FROM timefusion_stats WHERE component = 'wal' AND key = 'recovery_duration_ms'")"
          [[ "$recovery_ms" =~ ^[0-9]+$ ]] || { echo "::error::WAL recovery duration is unavailable"; exit 1; }
          (( recovery_ms <= MAX_WAL_RECOVERY_MS )) || { echo "::error::WAL recovery took ${recovery_ms}ms (budget ${MAX_WAL_RECOVERY_MS}ms)"; exit 1; }

      - name: Show Deployment Output
        run: 'echo "Deployment URL: ${{ steps.deploy.outputs.url }}"'
